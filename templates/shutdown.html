{% extends "base.html" %}

{% block title %}Application Shutdown{% endblock %}

{% block head %}
    <style>
        :root {
            --ink: #11231d;
            --forest: #1d4c3b;
            --mint: #dcecdf;
            --paper: #f7f2e8;
            --panel: rgba(255, 255, 255, 0.85);
            --shadow: 0 26px 60px rgba(17, 35, 29, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top right, rgba(29, 76, 59, 0.18), transparent 28%),
                linear-gradient(135deg, #f1f6f1 0%, var(--paper) 50%, #e4f1e8 100%);
        }

        .panel {
            width: min(640px, 100%);
            padding: 36px;
            border-radius: 28px;
            background: var(--panel);
            box-shadow: var(--shadow);
            border: 1px solid rgba(17, 35, 29, 0.1);
        }

        .eyebrow {
            display: inline-block;
            margin-bottom: 14px;
            padding: 7px 14px;
            border-radius: 999px;
            background: var(--mint);
            color: var(--forest);
            font-size: 0.82rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 4vw, 3.2rem);
            line-height: 1;
        }

        p {
            margin: 0;
            font-size: 1.08rem;
            line-height: 1.7;
        }
    </style>
{% endblock %}

{% block content %}
    <main class="panel">
        <div class="eyebrow">Application Shutdown</div>
        <h1>The Flask app is shutting down.</h1>
        <p>You can close this browser tab or restart the app from the terminal when needed.</p>
    </main>
{% endblock %}
