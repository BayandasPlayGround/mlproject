name: Build And Deploy Container To Azure Web App

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
  ACR_LOGIN_SERVER: slimtestdocker.azurecr.io
  IMAGE_REPOSITORY: studentperformance1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-training.txt

      - name: Generate training artifacts for deployment
        run: |
          python src/components/data_ingestion.py

      - name: Verify deployment package contents
        run: |
          test -f artifacts/model.onnx
          test -f artifacts/model_metadata.json
          test -f artifacts/model.pkl
          test -f artifacts/preprocessor.pkl

      - name: Log in to Azure Container Registry
        env:
          REGISTRY_USERNAME: ${{ secrets.ACR_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          echo "$REGISTRY_PASSWORD" | docker login "${{ env.ACR_LOGIN_SERVER }}" --username "$REGISTRY_USERNAME" --password-stdin

      - name: Build container image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_NAME=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPOSITORY }}
          docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest .

      - name: Smoke test container locally in CI
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_NAME=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPOSITORY }}
          trap 'docker rm -f student-score-smoke >/dev/null 2>&1 || true' EXIT
          docker run -d --name student-score-smoke -p 5000:5000 $IMAGE_NAME:$IMAGE_TAG
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5000/health >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:5000/health
          curl -fsS -X POST http://127.0.0.1:5000/predictdata \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "gender=female" \
            --data-urlencode "race_ethnicity=group B" \
            --data-urlencode "parental_level_of_education=bachelor's degree" \
            --data-urlencode "lunch=standard" \
            --data-urlencode "test_preparation_course=none" \
            --data-urlencode "reading_score=72" \
            --data-urlencode "writing_score=74" >/dev/null
          docker logs student-score-smoke

      - name: Push container image to ACR
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_NAME=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPOSITORY }}
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

      - name: Deploy image to Azure Web App
        env:
          IMAGE_TAG: ${{ github.sha }}
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
